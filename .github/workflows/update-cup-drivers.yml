name: Update Cup Drivers

on:
  workflow_dispatch:
  schedule:
    - cron: "30 10 * * *"

permissions:
  contents: write

jobs:
  update-drivers:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: python -m pip install beautifulsoup4 requests

      - name: Update Cup drivers
        run: python scripts/update_cup_series_drivers.py

      - name: Commit updated drivers
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add cup-series-drivers.json
          git commit -m "Update Cup Series drivers" || echo "No changes to commit"
          git push
