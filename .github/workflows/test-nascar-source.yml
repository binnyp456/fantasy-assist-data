name: Test NASCAR Source

on:
  workflow_dispatch:

jobs:
  test-source:
    runs-on: ubuntu-latest

    steps:
      - name: Download NASCAR schedule
        run: |
          curl -L https://cf.nascar.com/cacher/2026/race_list_basic.json -o schedule.json

      - name: Show top level keys
        run: |
          python3 -c "
import json
with open('schedule.json') as f:
    data = json.load(f)
print(list(data.keys()))
"
